name = "echo-chaos-engineer"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[triggers]
crons = ["0 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "echo-chaos-engineer"
database_id = "a9bc833e-c00d-4c39-bf09-913c9efc83b8"

[[kv_namespaces]]
binding = "CACHE"
id = "9eceffad1de945c48263fc61c3d5cf97"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ALERT_ROUTER"
service = "echo-alert-router"

[[services]]
binding = "CIRCUIT_BREAKER"
service = "echo-circuit-breaker"
